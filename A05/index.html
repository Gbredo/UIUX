<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diretório de Colaboradores</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="profile-card" id="card">
    <div class="card-header">
      <div class="avatar" id="avatar"></div>
      <div class="header-text">
        <p class="card-name" id="card-name"></p>
        <p class="card-role" id="card-role"></p>
      </div>
    </div>

    <div class="card-body">

      <div class="profile-group" id="group-identity">
        <p class="group-label">Identidade profissional</p>
      </div>

      <div class="profile-group" id="group-location">
        <p class="group-label">Localização física</p>
      </div>

      <div class="profile-group" id="group-contact">
        <p class="group-label">Contato</p>
      </div>

    </div>
  </div>

  <script src="app.js"></script>

</body>
</html>
